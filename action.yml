name: 'ComplyKit'
description: 'Cookie compliance checker — static analysis + runtime browser audit'
author: 'André Virdarson'

inputs:
  scan_path:
    description: 'Path to scan for cookie violations'
    required: false
    default: ''
  audit_url:
    description: 'URL to audit with headless browser'
    required: false
    default: ''
  config:
    description: 'Path to complykit.yml config file'
    required: false
    default: ''
  format:
    description: 'Output format: pretty, json, sarif'
    required: false
    default: 'pretty'
  baseline:
    description: 'Path to baseline file for incremental adoption'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install complykit
      shell: bash
      run: |
        cd ${{ github.action_path }}
        bun install
        bun run build

    - name: Install Playwright browsers
      if: ${{ inputs.audit_url != '' }}
      shell: bash
      run: bunx playwright install --with-deps chromium

    - name: Static scan
      if: ${{ inputs.scan_path != '' }}
      shell: bash
      run: |
        ARGS="scan ${{ inputs.scan_path }}"
        if [ -n "${{ inputs.config }}" ]; then ARGS="$ARGS --config ${{ inputs.config }}"; fi
        if [ -n "${{ inputs.format }}" ] && [ "${{ inputs.format }}" != "pretty" ]; then ARGS="$ARGS --format ${{ inputs.format }}"; fi
        if [ -n "${{ inputs.baseline }}" ]; then ARGS="$ARGS --baseline ${{ inputs.baseline }}"; fi
        bun ${{ github.action_path }}/dist/cli.js $ARGS

    - name: Browser audit
      if: ${{ inputs.audit_url != '' }}
      shell: bash
      run: |
        ARGS="audit ${{ inputs.audit_url }}"
        if [ -n "${{ inputs.config }}" ]; then ARGS="$ARGS --config ${{ inputs.config }}"; fi
        if [ -n "${{ inputs.format }}" ] && [ "${{ inputs.format }}" != "pretty" ]; then ARGS="$ARGS --format ${{ inputs.format }}"; fi
        if [ -n "${{ inputs.baseline }}" ]; then ARGS="$ARGS --baseline ${{ inputs.baseline }}"; fi
        bun ${{ github.action_path }}/dist/cli.js $ARGS
